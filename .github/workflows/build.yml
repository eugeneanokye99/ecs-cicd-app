name: Build and Deploy to ECR

on:
  push:
    branches:
      - master

permissions:
  id-token: write   # Required for OIDC token request
  contents: read    # Required to checkout the repository

env:
  ENVIRONMENT: prod
  PROJECT_NAME: bem13

jobs:
  build-and-push:
    name: Build Image and Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout application code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Amazon Corretto)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: corretto
          cache: maven

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests -q

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: github-actions-bem13-app

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        id: build-push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.PROJECT_NAME }}-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHA_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          LATEST_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          docker build \
            --tag "${SHA_URI}" \
            --label "git-commit=${IMAGE_TAG}" \
            --label "git-repo=${{ github.repository }}" \
            --label "built-by=github-actions" \
            .

          # Immutable, traceable tag — this is the exact image CodeDeploy deploys.
          docker push "${SHA_URI}"

          # Also tag+push :latest — EventBridge's EcrPushRule filters specifically
          # on this tag to trigger CodePipeline. The deployment itself still uses
          # the SHA-pinned image via imageDetail.json below, not this tag.
          docker tag "${SHA_URI}" "${LATEST_URI}"
          docker push "${LATEST_URI}"

          echo "sha_image_uri=${SHA_URI}" >> "${GITHUB_OUTPUT}"
          echo "Pushed: ${SHA_URI} and ${LATEST_URI}"

      - name: Assemble and upload deploy bundle to S3
        env:
          IMAGE_URI: ${{ steps.build-push.outputs.sha_image_uri }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          SSM_PREFIX="/${PROJECT_NAME}/${ENVIRONMENT}"

          ARTIFACT_BUCKET=$(aws ssm get-parameter \
            --name "${SSM_PREFIX}/artifact-bucket-name" \
            --query 'Parameter.Value' --output text)

          TASK_EXEC_ROLE=$(aws ssm get-parameter \
            --name "${SSM_PREFIX}/task-execution-role-arn" \
            --query 'Parameter.Value' --output text)

          TASK_ROLE=$(aws ssm get-parameter \
            --name "${SSM_PREFIX}/task-role-arn" \
            --query 'Parameter.Value' --output text)

          echo "Artifact bucket:    ${ARTIFACT_BUCKET}"
          echo "Task exec role:     ${TASK_EXEC_ROLE}"
          echo "Task role:          ${TASK_ROLE}"
          echo "Image URI:          ${IMAGE_URI}"

          # imageDetail.json — CodePipeline's CodeDeployToECS action reads this
          # to resolve the real image and substitute <IMAGE1_NAME> in taskdef.json.
          cat > imageDetail.json << EOF
          {"ImageURI": "${IMAGE_URI}"}
          EOF

          # taskdef.json — new revision registered under the same family as the
          # CloudFormation-managed task definition (templates/ecs.yaml).
          cat > taskdef.json << EOF
          {
            "family": "${ENVIRONMENT}-${PROJECT_NAME}-task",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "1024",
            "memory": "2048",
            "executionRoleArn": "${TASK_EXEC_ROLE}",
            "taskRoleArn": "${TASK_ROLE}",
            "containerDefinitions": [
              {
                "name": "app",
                "image": "<IMAGE1_NAME>",
                "essential": true,
                "portMappings": [
                  {
                    "containerPort": 8080,
                    "protocol": "tcp"
                  }
                ],
                "environment": [
                  {"name": "SPRING_PROFILES_ACTIVE", "value": "${ENVIRONMENT}"}
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/${ENVIRONMENT}-${PROJECT_NAME}",
                    "awslogs-region": "${AWS_REGION}",
                    "awslogs-stream-prefix": "ecs"
                  }
                },
                "healthCheck": {
                  "command": ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"],
                  "interval": 30,
                  "timeout": 5,
                  "retries": 3,
                  "startPeriod": 60
                }
              }
            ]
          }
          EOF

          # Bundle all three files exactly as pipeline.yaml's Source stage expects:
          # a single object at <Environment>/deploy-artifacts.zip (not a folder sync).
          zip -q deploy-artifacts.zip appspec.yaml taskdef.json imageDetail.json

          aws s3 cp deploy-artifacts.zip \
            "s3://${ARTIFACT_BUCKET}/${ENVIRONMENT}/deploy-artifacts.zip" \
            --sse AES256

          echo ""
          echo "Deploy bundle uploaded to s3://${ARTIFACT_BUCKET}/${ENVIRONMENT}/deploy-artifacts.zip"
          echo "EventBridge (ECR :latest push event) will trigger CodePipeline ->"
          echo "CodeDeploy Blue/Green -> ECS service update."
