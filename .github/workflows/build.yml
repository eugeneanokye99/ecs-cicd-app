name: Build and Deploy to ECR

on:
  push:
    branches:
      - master

permissions:
  id-token: write   # Required for OIDC token request
  contents: read    # Required to checkout the repository

env:
  ENVIRONMENT: prod
  PROJECT_NAME: bem13

jobs:
  build-and-push:
    name: Build Image and Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout application code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Amazon Corretto)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: corretto
          cache: maven

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests -q

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: github-actions-bem13-app

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push SHA-tagged image to ECR
        id: build-push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.PROJECT_NAME }}-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHA_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          docker build \
            --tag "${SHA_URI}" \
            --label "git-commit=${IMAGE_TAG}" \
            --label "git-repo=${{ github.repository }}" \
            --label "built-by=github-actions" \
            .

          # Immutable, traceable tag — this is the exact image CodeDeploy deploys.
          # Deliberately NOT pushing :latest here — that happens only after the S3
          # deploy bundle is uploaded below, since :latest is what triggers
          # EventBridge -> CodePipeline, and the pipeline needs the bundle to
          # already exist in S3 the moment it starts (otherwise its Source stage
          # fails with a "Forbidden" error fetching a not-yet-uploaded object).
          docker push "${SHA_URI}"

          echo "sha_image_uri=${SHA_URI}" >> "${GITHUB_OUTPUT}"
          echo "Pushed: ${SHA_URI}"

      - name: Assemble and upload deploy bundle to S3
        env:
          IMAGE_URI: ${{ steps.build-push.outputs.sha_image_uri }}
        run: |
          SSM_PREFIX="/${PROJECT_NAME}/${ENVIRONMENT}"
          TASK_FAMILY="${ENVIRONMENT}-${PROJECT_NAME}-task"

          ARTIFACT_BUCKET=$(aws ssm get-parameter \
            --name "${SSM_PREFIX}/artifact-bucket-name" \
            --query 'Parameter.Value' --output text)

          echo "Artifact bucket:    ${ARTIFACT_BUCKET}"
          echo "Image URI:          ${IMAGE_URI}"

          # imageDetail.json — CodePipeline's CodeDeployToECS action reads this
          # to resolve the real image and substitute <IMAGE1_NAME> in taskdef.json.
          cat > imageDetail.json << EOF
          {"ImageURI": "${IMAGE_URI}"}
          EOF

          # taskdef.json — start from the CURRENTLY REGISTERED task definition
          # (the one templates/ecs.yaml created) instead of hand-writing a
          # duplicate. This guarantees the container/role/logging structure
          # always matches whatever CloudFormation actually deployed, and only
          # the "app" container's image is swapped for the <IMAGE1_NAME>
          # placeholder that CodeDeploy substitutes at deploy time.
          aws ecs describe-task-definition \
            --task-definition "${TASK_FAMILY}" \
            --query 'taskDefinition' \
            --output json \
          | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)
                | (.containerDefinitions[] | select(.name == "app") | .image) = "<IMAGE1_NAME>"' \
          > taskdef.json

          echo "Resolved task definition:"
          cat taskdef.json

          # Bundle all three files exactly as pipeline.yaml's Source stage expects:
          # a single object at <Environment>/deploy-artifacts.zip (not a folder sync).
          zip -q deploy-artifacts.zip appspec.yaml taskdef.json imageDetail.json

          aws s3 cp deploy-artifacts.zip \
            "s3://${ARTIFACT_BUCKET}/${ENVIRONMENT}/deploy-artifacts.zip" \
            --sse AES256

          echo ""
          echo "Deploy bundle uploaded to s3://${ARTIFACT_BUCKET}/${ENVIRONMENT}/deploy-artifacts.zip"

      - name: Tag and push :latest to trigger the pipeline
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.PROJECT_NAME }}-app
          SHA_URI: ${{ steps.build-push.outputs.sha_image_uri }}
        run: |
          LATEST_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          # The S3 deploy bundle is already uploaded at this point, so
          # EventBridge's EcrPushRule firing on this push is safe — CodePipeline's
          # Source stage will find the object waiting for it.
          docker tag "${SHA_URI}" "${LATEST_URI}"
          docker push "${LATEST_URI}"

          echo "Pushed: ${LATEST_URI}"
          echo "EventBridge (ECR :latest push event) will trigger CodePipeline ->"
          echo "CodeDeploy Blue/Green -> ECS service update."
